<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Update</h1>

    <form id="updateForm">
        <label for="">AnvändarID</label><br>
        <input type="number" name="uid"><br>

        <label for="">Namn</label><br>
        <input type="text" name="name"><br>

        <label for="">mail</label><br>
        <input type="email" name="email"><br>

        <input type="submit" value="Uppdatera"><br>
    </form>

    <output id="data"></output>
</body>
<script>
    const updateForm = document.getElementById('updateForm')
    updateForm.addEventListener('submit', updateUser)

    async function updateUser(e) {
        e.preventDefault(updateForm)

        const formData = new FormData(updateForm)
        const data = new URLSearchParams(formData)

        const response = await fetch('http://localhost:5000/api/users', {
            method: "PATCH", // C R U D => update: PATCH
            body: data
        })
        const result = await response.json()

        console.log("result: " + result.success)

        if (result.success) {
            getUsers();
        }
    }

    async function getUsers() {
        const response = await fetch('http://localhost:5000/api/users')
        const users = await response.json()

        document.getElementById('data').innerText = JSON.stringify(users)
    }
    
</script>

</html>
